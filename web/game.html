<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HallwayLedBar — Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .shoot-btn { font-size: 1.6em; padding: 28px 0; min-height: 80px; touch-action: manipulation; user-select: none; }
    </style>
    <script src="game.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Color Match</h1>

        <div class="card">
            <p style="text-align:center; margin-top:0;">Tap a color to shoot. Keys: <strong>A</strong>=R, <strong>S</strong>=G, <strong>D</strong>=B, <strong>Q</strong>=Y, <strong>W</strong>=C, <strong>E</strong>=M.</p>
            <div class="button-group" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;">
                <button id="btnR" class="btn shoot-btn" data-color="R" style="background:#e33; color:#fff;">R</button>
                <button id="btnG" class="btn shoot-btn" data-color="G" style="background:#2c2; color:#fff;">G</button>
                <button id="btnB" class="btn shoot-btn" data-color="B" style="background:#36f; color:#fff;">B</button>
                <button id="btnY" class="btn shoot-btn" data-color="Y" style="background:#cc3; color:#222;">Y</button>
                <button id="btnC" class="btn shoot-btn" data-color="C" style="background:#3cc; color:#222;">C</button>
                <button id="btnM" class="btn shoot-btn" data-color="M" style="background:#c3c; color:#fff;">M</button>
            </div>
        </div>

        <div style="text-align:center; margin-top:20px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;">
            <button id="btnBack" class="btn">Back</button>
            <label style="color:#fff;">Start at level
                <input id="startLevel" type="number" min="1" value="1" style="width:70px; margin-left:6px;">
            </label>
            <button id="btnRestart" class="btn">Restart</button>
        </div>

        <div id="message" class="message"></div>
    </div>
</body>
</html>
