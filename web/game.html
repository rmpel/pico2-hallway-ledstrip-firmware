<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HallwayLedBar — Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="game.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Color Match</h1>

        <div class="card">
            <p style="text-align:center; margin-top:0;">Tap a color to shoot. Keys: <strong>A</strong>=R, <strong>S</strong>=G, <strong>D</strong>=B.</p>
            <div class="button-group" style="display:flex; gap:6px; flex-wrap:wrap; align-items:stretch;">
                <button id="btnR" class="btn" style="flex:2; min-width:80px; background:#e33; color:#fff; font-size:1.4em; padding:20px;">R</button>
                <div class="mix-hint" style="flex:1; min-width:50px; background:#cc3; color:#222; font-size:0.9em; padding:20px 6px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; pointer-events:none; opacity:0.7;">
                    <strong style="font-size:1.2em;">Y</strong><span>Q</span>
                </div>
                <button id="btnG" class="btn" style="flex:2; min-width:80px; background:#2c2; color:#fff; font-size:1.4em; padding:20px;">G</button>
                <div class="mix-hint" style="flex:1; min-width:50px; background:#3cc; color:#222; font-size:0.9em; padding:20px 6px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; pointer-events:none; opacity:0.7;">
                    <strong style="font-size:1.2em;">C</strong><span>W</span>
                </div>
                <button id="btnB" class="btn" style="flex:2; min-width:80px; background:#36f; color:#fff; font-size:1.4em; padding:20px;">B</button>
                <div class="mix-hint" style="flex:1; min-width:50px; background:#c3c; color:#fff; font-size:0.9em; padding:20px 6px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; pointer-events:none; opacity:0.7;">
                    <strong style="font-size:1.2em;">M</strong><span>E</span>
                </div>
            </div>
        </div>

        <div style="text-align:center; margin-top:20px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;">
            <button id="btnBack" class="btn">Back</button>
            <label style="color:#fff;">Start at level
                <input id="startLevel" type="number" min="1" value="1" style="width:70px; margin-left:6px;">
            </label>
            <button id="btnRestart" class="btn">Restart</button>
        </div>

        <div id="message" class="message"></div>
    </div>
</body>
</html>
